# YangClaw config example
# Copy to yangclaw.yaml and fill in your actual values

models:
  mode: merge
  providers:
    minimax:
      baseUrl: "https://api.minimaxi.com/anthropic/v1"
      api: anthropic-messages
      auth: api-key
      apiKey: "YOUR_MINIMAX_API_KEY"
      models:
        - id: "MiniMax-M2.7"
          name: MiniMax M2.7
          reasoning: true
          input: [text]
          cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
          contextWindow: 200000
          maxTokens: 8192

    deepseek:
      baseUrl: "https://api.deepseek.com/v1"
      api: openai-completions
      auth: api-key
      apiKey: "YOUR_DEEPSEEK_API_KEY"
      models:
        - id: deepseek-chat
          name: DeepSeek Chat
          reasoning: false
          input: [text]
          cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
          contextWindow: 128000
          maxTokens: 8192
        - id: deepseek-reasoner
          name: DeepSeek Reasoner
          reasoning: true
          input: [text]
          cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
          contextWindow: 128000
          maxTokens: 8192

    qwen:
      baseUrl: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      api: openai-completions
      auth: api-key
      apiKey: "YOUR_QWEN_API_KEY"
      models:
        - id: qwen-plus
          name: Qwen Plus
          reasoning: false
          input: [text]
          cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
          contextWindow: 131072
          maxTokens: 8192

agents:
  defaults:
    model:
      primary: minimax/MiniMax-M2.7
      fallbacks:
        - deepseek/deepseek-chat
        - qwen/qwen-plus

workspace: .data
